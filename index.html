<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cursorarium v4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14121c; --ink-2:#1c1a2b;
    --glass:rgba(34,32,51,.62); --glass-line:rgba(255,255,255,.10);
    --amber:#ffb347; --mint:#6ee7d8;
    --text:#efeaf6; --muted:#a59fc0;
    --display:"Fredoka","Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    --body:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(1200px 800px at 18% -10%, #241f38 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 120%, #1a2433 0%, transparent 55%),
      var(--ink);
    color:var(--text); font-family:var(--body); overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }

  /* ---- Toolbar ---- */
  .bar{
    position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:30;
    display:flex; align-items:center; gap:13px; flex-wrap:wrap; justify-content:center;
    max-width:calc(100vw - 28px); padding:10px 14px;
    background:var(--glass); border:1px solid var(--glass-line); border-radius:18px;
    backdrop-filter:blur(14px) saturate(140%); -webkit-backdrop-filter:blur(14px) saturate(140%);
    box-shadow:0 18px 40px -22px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.06);
  }
  .brand{display:flex;flex-direction:column;line-height:1;padding-right:2px;}
  .brand b{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:.3px;}
  .brand b i{font-style:normal;color:var(--amber);}
  .brand span{font-size:11px;color:var(--muted);margin-top:3px;}

  .group{display:flex;align-items:center;gap:8px;}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;}

  .seg{display:flex;background:rgba(0,0,0,.28);border-radius:11px;padding:3px;gap:2px;border:1px solid rgba(255,255,255,.05);}
  .seg button{
    font-family:var(--body);font-weight:600;font-size:13px;color:var(--muted);
    background:transparent;border:0;border-radius:8px;padding:7px 12px;cursor:pointer;
    transition:color .15s, background .15s, box-shadow .15s; white-space:nowrap;
  }
  .seg button .plat{font-size:10px;color:inherit;opacity:.7;margin-left:5px;font-weight:500;}
  .seg button[aria-pressed="true"]{color:var(--ink);background:var(--amber);box-shadow:0 4px 12px -4px rgba(255,179,71,.7);}
  .seg button:focus-visible{outline:2px solid var(--mint);outline-offset:2px;}

  .pill{
    font-family:var(--body);font-weight:600;font-size:13px;color:var(--text);
    background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.06);border-radius:11px;
    padding:8px 13px;cursor:pointer;white-space:nowrap;transition:background .15s, transform .08s, border-color .15s;
  }
  .pill:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);}
  .pill:active{transform:translateY(1px);}
  .pill:focus-visible{outline:2px solid var(--mint);outline-offset:2px;}
  .pill .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#5c5874;margin-right:7px;vertical-align:middle;transition:background .15s, box-shadow .15s;}
  .pill[aria-pressed="true"] .dot{background:var(--mint);box-shadow:0 0 10px var(--mint);}

  /* ---- Tank ---- */
  .stage{position:fixed;inset:0;display:grid;place-items:center;}
  .tank{
    position:relative; width:90vw; height:90vh; border-radius:26px;
    background:
      radial-gradient(120% 90% at 30% 0%, rgba(110,231,216,.08), transparent 60%),
      radial-gradient(120% 100% at 80% 110%, rgba(255,179,71,.07), transparent 60%),
      linear-gradient(160deg, #211e31 0%, #15131f 100%);
    box-shadow:inset 0 2px 30px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.10), 0 40px 90px -50px rgba(0,0,0,.9);
    overflow:hidden;
  }
  .tank::after{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:linear-gradient(180deg, rgba(255,255,255,.05), transparent 18%);}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;}

  /* ---- Virtual cursor (DOM overlay) ---- */
  #vcursor{position:absolute;left:0;top:0;z-index:10;pointer-events:none;opacity:0;transition:opacity .1s;will-change:transform;}
  #vcursor .arrow,#vcursor .spark{display:none;}
  #vcursor.mode-normal .arrow{display:block;}
  #vcursor.mode-fun .spark{display:block;}
  .arrow{position:absolute;left:0;top:0;}
  .arrow-svg{display:block;filter:drop-shadow(1px 1px 1.5px rgba(0,0,0,.4));overflow:visible;}
  #vcursor.mac .arrow-svg.win{display:none;}
  #vcursor.win .arrow-svg.mac{display:none;}
  .spark{position:absolute;left:0;top:0;width:36px;height:36px;margin:-18px 0 0 -18px;filter:drop-shadow(0 0 9px #ff5ae0);animation:hue 5s linear infinite;transition:transform .08s;}
  .spark-svg{display:block;animation:spin 6s linear infinite;transform-origin:center;overflow:visible;}
  #vcursor.down .spark{transform:scale(.72);}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes hue{from{filter:drop-shadow(0 0 9px #ff5ae0) hue-rotate(0deg);}to{filter:drop-shadow(0 0 9px #ff5ae0) hue-rotate(360deg);}}

  /* ---- Overlay trail dots ---- */
  .trail-dot{
    position:absolute;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;
    pointer-events:none;z-index:9;
    background:radial-gradient(circle, hsla(var(--h),95%,72%,.9), hsla(var(--h),90%,55%,0) 70%);
    animation:dotfade .45s ease-out forwards;
  }
  @keyframes dotfade{from{opacity:.65;transform:scale(1);}to{opacity:0;transform:scale(.3);}}

  .hint{
    position:absolute;left:50%;bottom:16px;transform:translateX(-50%);z-index:8;pointer-events:none;
    font-size:12px;color:var(--muted);background:rgba(0,0,0,.25);padding:6px 12px;border-radius:999px;
    border:1px solid rgba(255,255,255,.05);transition:opacity .6s;
  }
  .hint b{color:var(--text);font-weight:600;}

  @media (prefers-reduced-motion:reduce){.spark,.spark-svg{animation:none;}}
  @media (max-width:620px){.brand{display:none;}.bar{gap:9px;top:12px;padding:9px 11px;}}
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><b>Cursor<i>arium</i></b><span>Drag the jellies. Mind the cursor.</span></div>

    <div class="group">
      <span class="lbl">Cursor</span>
      <div class="seg" role="group" aria-label="Cursor style">
        <button id="curNorm" aria-pressed="true">Normal<span class="plat" id="platLabel"></span></button>
        <button id="curFun"  aria-pressed="false">Fun</button>
      </div>
    </div>

    <button class="pill" id="gravBtn" aria-pressed="false"><span class="dot"></span>Gravity</button>
    <button class="pill" id="distortBtn" aria-pressed="true"><span class="dot"></span>Distort</button>
    <button class="pill" id="scatter">Scatter</button>
  </div>

  <div class="stage">
    <div class="tank" id="tank">
      <canvas id="cv"></canvas>

      <div id="vcursor" class="mode-normal">
        <div class="arrow">
          <svg class="arrow-svg win" width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
            <g transform="scale(1)"><path d="M0 0 L0 18 L4.5 13.7 L7.6 20.6 L10.2 19.4 L7.1 12.6 L13.2 12.6 Z" fill="#f7f7f7" stroke="#1a1a1a" stroke-width="1.4" stroke-linejoin="round"/></g>
          </svg>
          <svg class="arrow-svg mac" width="20" height="28" viewBox="0 0 20 28" xmlns="http://www.w3.org/2000/svg">
            <g transform="rotate(-5) scale(0.99)"><path d="M0 0 L0 16.6 L3.9 13.1 L6.2 18.8 L8.2 17.9 L6 12.4 L11 12.4 Z" fill="#111" stroke="#fff" stroke-width="1.4" stroke-linejoin="round"/></g>
          </svg>
        </div>
        <div class="spark">
          <svg class="spark-svg" width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="sg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/><stop offset="45%" stop-color="#ff7ae6"/><stop offset="100%" stop-color="#a13bff"/>
            </radialGradient></defs>
            <g transform="translate(18 18)">
              <path d="M13 0 L2.83 2.83 L0 13 L-2.83 2.83 L-13 0 L-2.83 -2.83 L0 -13 L2.83 -2.83 Z" fill="url(#sg)"/>
              <circle r="2.4" fill="#fff"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="hint" id="hint">Grab a jelly and <b>fling</b> it</div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  // ---------- platform ----------
  const ua = navigator.userAgent || "";
  const plat = (navigator.userAgentData && navigator.userAgentData.platform) || navigator.platform || "";
  const IS_MAC = /mac/i.test(plat) || /Mac|iPhone|iPad|iPod/.test(ua);
  document.getElementById("platLabel").textContent = IS_MAC ? "macOS" : "Windows";

  const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- canvas ----------
  const tank = document.getElementById("tank");
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  const vcursor = document.getElementById("vcursor");
  vcursor.classList.add(IS_MAC ? "mac" : "win");

  let W = 0, H = 0;
  const dpr = Math.min(window.devicePixelRatio || 1, 2.5);

  // ---------- state ----------
  let cursorMode = "normal";    // "normal" | "fun"
  let gravityOn  = false;
  let distortOn  = true;        // velocity-based squash & stretch

  const GRAV = 0.55;
  const WALL_E = reduceMotion ? 0.55 : 0.9;
  const OBJ_E  = reduceMotion ? 0.5  : 0.92;
  const AIR    = reduceMotion ? 0.985 : 1.0;
  const MAX_SPEED = 36;

  const PALETTE = [
    ["#ff7a8a","#c8324a"],["#ffd166","#e8973a"],["#79f2c0","#1fae7e"],
    ["#7ab8ff","#356fd6"],["#c79bff","#7a45d6"],["#ff9ee0","#c84aa0"],
    ["#9af0ff","#2aa6c4"],["#ffe08a","#d9a02a"],
  ];

  let objects = [], ripples = [];

  // ---------- objects ----------
  function makeObjects(){
    objects = [];
    const n = 14;
    for (let i = 0; i < n; i++){
      const r = 16 + Math.random() * (Math.min(W,H) < 520 ? 16 : 30);
      const pal = PALETTE[i % PALETTE.length];
      objects.push({
        x:r+Math.random()*(W-2*r), y:r+Math.random()*(H-2*r),
        vx:(Math.random()*2-1)*(reduceMotion?1.2:4), vy:(Math.random()*2-1)*(reduceMotion?1.2:4),
        r, mass:r*r, c0:pal[0], c1:pal[1], held:false, lastX:0, lastY:0, squash:0,
      });
    }
  }
  function scatter(){
    for (const o of objects){
      const a = Math.random()*Math.PI*2, s = (reduceMotion?6:16)+Math.random()*(reduceMotion?4:14);
      o.vx=Math.cos(a)*s; o.vy=Math.sin(a)*s; o.held=false;
    }
    ripples.length = 0; fadeHint();
  }

  // ---------- resize ----------
  function resize(){
    const rect = tank.getBoundingClientRect();
    W = rect.width; H = rect.height;
    cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    if (!objects.length) makeObjects();
    else for (const o of objects){ o.x=Math.max(o.r,Math.min(W-o.r,o.x)); o.y=Math.max(o.r,Math.min(H-o.r,o.y)); }
  }
  window.addEventListener("resize", resize);

  // ---------- pointer + cursor overlay ----------
  let mx=-999, my=-999, inside=false, down=false;
  let grabbed=null, grabDX=0, grabDY=0;
  let lastDot=0, dotHue=0;

  function localPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
  function moveCursor(){ vcursor.style.transform = `translate(${mx}px, ${my}px)`; }
  let nativeHidden=false;
  function hideNative(h){ if(h===nativeHidden) return; nativeHidden=h; cv.style.cursor = h ? "none" : ""; }
  function showCursor(){ vcursor.style.opacity = "1"; hideNative(true); }
  function hideCursor(){ vcursor.style.opacity = "0"; hideNative(false); }

  function spawnDot(x,y){
    if (reduceMotion) return;
    const now = performance.now();
    if (now - lastDot < 16) return;
    lastDot = now; dotHue = (dotHue + 12) % 360;
    const d = document.createElement("div");
    d.className = "trail-dot";
    d.style.setProperty("--h", dotHue);
    d.style.left = x + "px"; d.style.top = y + "px";
    d.addEventListener("animationend", () => d.remove());
    tank.appendChild(d);
    const dots = tank.getElementsByClassName("trail-dot");
    if (dots.length > 40) dots[0].remove();
  }
  function clearDots(){ tank.querySelectorAll(".trail-dot").forEach(d => d.remove()); }

  cv.addEventListener("pointerenter", (e) => { const p=localPos(e); mx=p.x; my=p.y; inside=true; moveCursor(); showCursor(); });
  cv.addEventListener("pointerleave", () => { if (!down){ inside = false; hideCursor(); } });

  cv.addEventListener("pointerdown", (e) => {
    cv.setPointerCapture(e.pointerId);
    const p = localPos(e); mx=p.x; my=p.y; inside=true; down=true;
    vcursor.classList.add("down"); moveCursor(); showCursor();
    for (let i = objects.length-1; i >= 0; i--){
      const o = objects[i];
      if ((mx-o.x)**2 + (my-o.y)**2 <= o.r*o.r){
        grabbed=o; grabDX=o.x-mx; grabDY=o.y-my; o.held=true; o.lastX=o.x; o.lastY=o.y;
        objects.splice(i,1); objects.push(o); break;
      }
    }
    fadeHint();
  });

  window.addEventListener("pointermove", (e) => {
    const p = localPos(e); mx=p.x; my=p.y;
    const overCanvas = down || e.target === cv;          // toolbar overlaps the tank; only the canvas counts
    inside = overCanvas && mx>=0 && my>=0 && mx<=W && my<=H;
    if (!inside && down){ dropOutside(e); return; }   // dragged past the edge -> hand back to the OS cursor
    if (inside){ moveCursor(); showCursor(); } else { hideCursor(); }
    if (grabbed){
      grabbed.x = Math.max(grabbed.r, Math.min(W-grabbed.r, mx+grabDX));
      grabbed.y = Math.max(grabbed.r, Math.min(H-grabbed.r, my+grabDY));
    }
    if (cursorMode === "fun" && inside) spawnDot(mx,my);
  });

  function dropOutside(e){
    try{ cv.releasePointerCapture(e.pointerId); }catch(_){}
    down=false; vcursor.classList.remove("down");
    if (grabbed){ grabbed.held=false; grabbed=null; }   // let go of the jelly (keeps its fling velocity)
    inside=false; hideCursor();
  }

  function release(e){
    if (e){ try{ cv.releasePointerCapture(e.pointerId);}catch(_){} }
    down = false; vcursor.classList.remove("down");
    if (grabbed){ grabbed.held=false; grabbed=null; }
    if (e){
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const p = localPos(e); mx=p.x; my=p.y;
      inside = el === cv && mx>=0 && my>=0 && mx<=W && my<=H;
      if (inside){ moveCursor(); showCursor(); } else hideCursor();
    }
  }
  window.addEventListener("pointerup", release);
  window.addEventListener("pointercancel", release);

  // ---------- physics ----------
  function clampSpeed(o){ const s=Math.hypot(o.vx,o.vy); if(s>MAX_SPEED){const k=MAX_SPEED/s;o.vx*=k;o.vy*=k;} }
  function addRipple(x,y,strength,color){
    if (reduceMotion) return;
    if (ripples.length>40) ripples.shift();
    ripples.push({x,y,r:2,max:18+strength*2.2,a:Math.min(.6,strength*0.06),color});
  }

  function step(){
    for (const o of objects){
      if (o.held){
        o.vx=o.x-o.lastX; o.vy=o.y-o.lastY; o.lastX=o.x; o.lastY=o.y;
        o.squash*=0.85; continue;
      }
      if (gravityOn) o.vy += GRAV;
      o.vx*=AIR; o.vy*=AIR; clampSpeed(o);
      o.x+=o.vx; o.y+=o.vy; o.squash*=0.82;

      if (o.x-o.r<0){ o.x=o.r; o.vx=-o.vx*WALL_E; o.squash=Math.min(.5,Math.abs(o.vx)*0.04); addRipple(0,o.y,Math.abs(o.vx),o.c0); }
      else if (o.x+o.r>W){ o.x=W-o.r; o.vx=-o.vx*WALL_E; o.squash=Math.min(.5,Math.abs(o.vx)*0.04); addRipple(W,o.y,Math.abs(o.vx),o.c0); }
      if (o.y-o.r<0){ o.y=o.r; o.vy=-o.vy*WALL_E; o.squash=Math.min(.5,Math.abs(o.vy)*0.04); addRipple(o.x,0,Math.abs(o.vy),o.c0); }
      else if (o.y+o.r>H){ o.y=H-o.r; o.vy=-o.vy*WALL_E; o.squash=Math.min(.5,Math.abs(o.vy)*0.04); addRipple(o.x,H,Math.abs(o.vy),o.c0);
        if (gravityOn && Math.abs(o.vy)<0.6) o.vy=0; }
    }
    for (let i=0;i<objects.length;i++){
      for (let j=i+1;j<objects.length;j++){
        const a=objects[i],b=objects[j];
        let dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy); const min=a.r+b.r;
        if (dist===0){ dx=0.01; dist=0.01; }
        if (dist<min){
          const nx=dx/dist,ny=dy/dist,overlap=min-dist;
          const iaA=a.held?0:1/a.mass, iaB=b.held?0:1/b.mass, sum=iaA+iaB||1;
          a.x-=nx*overlap*(iaA/sum); a.y-=ny*overlap*(iaA/sum);
          b.x+=nx*overlap*(iaB/sum); b.y+=ny*overlap*(iaB/sum);
          const rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if (rel<0){
            const imp=-(1+OBJ_E)*rel/sum;
            a.vx-=imp*iaA*nx; a.vy-=imp*iaA*ny; b.vx+=imp*iaB*nx; b.vy+=imp*iaB*ny;
            const strength=Math.abs(rel);
            if (strength>2.2){ addRipple(a.x+nx*a.r,a.y+ny*a.r,strength,b.c0); a.squash=Math.min(.45,strength*0.045); b.squash=Math.min(.45,strength*0.045); }
          }
        }
      }
    }
  }

  // ---------- drawing ----------
  function drawJelly(o){
    ctx.save(); ctx.translate(o.x,o.y);
    const sp=Math.hypot(o.vx,o.vy);
    const speedStretch=Math.min(0.5, sp*0.02);   // distortion scales with drag / throw velocity
    const d=distortOn ? Math.max(o.squash, speedStretch) : 0;
    if (d>0.01 && sp>0.3){ const ang=Math.atan2(o.vy,o.vx); ctx.rotate(ang); ctx.scale(1+d,1-d*0.7); ctx.rotate(-ang); }
    ctx.shadowColor=o.c0; ctx.shadowBlur=18;
    const g=ctx.createRadialGradient(-o.r*0.35,-o.r*0.4,o.r*0.1,0,0,o.r);
    g.addColorStop(0,o.c0); g.addColorStop(1,o.c1); ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(0,0,o.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.lineWidth=1.2; ctx.strokeStyle="rgba(255,255,255,.18)";
    ctx.beginPath(); ctx.arc(0,0,o.r-0.6,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,.55)";
    ctx.beginPath(); ctx.ellipse(-o.r*0.32,-o.r*0.38,o.r*0.28,o.r*0.18,-0.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawRipples(){
    for (let i=ripples.length-1;i>=0;i--){
      const r=ripples[i]; r.r+=1.6; r.a*=0.9;
      if (r.a<0.02||r.r>r.max){ ripples.splice(i,1); continue; }
      ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.strokeStyle=r.color; ctx.globalAlpha=r.a; ctx.lineWidth=2.2; ctx.stroke(); ctx.globalAlpha=1;
    }
  }
  function render(){
    ctx.clearRect(0,0,W,H);
    drawRipples();
    for (const o of objects) drawJelly(o);
  }
  function loop(){ step(); render(); requestAnimationFrame(loop); }

  // ---------- hint ----------
  let hintGone=false;
  function fadeHint(){ if (hintGone) return; hintGone=true; const h=document.getElementById("hint"); if(!h) return; h.style.opacity="0"; setTimeout(()=>h.remove(),700); }

  // ---------- controls ----------
  const curNorm=document.getElementById("curNorm"), curFun=document.getElementById("curFun");
  function setMode(m){
    cursorMode=m;
    curFun.setAttribute("aria-pressed",m==="fun"); curNorm.setAttribute("aria-pressed",m==="normal");
    vcursor.classList.toggle("mode-fun",m==="fun"); vcursor.classList.toggle("mode-normal",m==="normal");
    clearDots();
  }
  curNorm.addEventListener("click",()=>setMode("normal"));
  curFun.addEventListener("click",()=>setMode("fun"));

  const gravBtn=document.getElementById("gravBtn");
  gravBtn.addEventListener("click",()=>{ gravityOn=!gravityOn; gravBtn.setAttribute("aria-pressed",gravityOn); if (gravityOn) for (const o of objects) o.vy += -2-Math.random()*3; });
  const distortBtn=document.getElementById("distortBtn");
  distortBtn.addEventListener("click",()=>{ distortOn=!distortOn; distortBtn.setAttribute("aria-pressed",distortOn); });
  document.getElementById("scatter").addEventListener("click",scatter);

  // ---------- go ----------
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
